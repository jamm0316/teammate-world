<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#14111d">
<link rel="manifest" href="manifest.json">
<!-- iOS -->
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="팀메이트 월드">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gothic+A1:wght@400;500;700;900&family=Jua&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#f3eefb; --mut:#a79cc4;
    --g1:#ff6b6b; --g2:#ffb454; --g3:#2ec4b6; --g4:#8b8bff;
    --hot:#ff7a59; --hot2:#ffb454;
    --o:#3fd6c4; --x:#ff7a8a;
    --basic:#8aa0c8; --rare:#5b8cff; --legend:#ffcf3a;
    --display:'Black Han Sans',sans-serif; --round:'Jua',sans-serif; --body:'Gothic A1',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;min-height:100dvh;color:var(--ink);font-family:var(--body);
    background:radial-gradient(120% 90% at 80% -10%,rgba(255,122,89,.14),transparent 55%),
               radial-gradient(120% 90% at -10% 0%,rgba(139,139,255,.14),transparent 55%),#14111d}
  .app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

  /* ============ ONBOARD / GACHA (narrow card) ============ */
  .card{max-width:420px;margin:auto;padding:30px 24px;width:100%;animation:fade .45s ease}
  .logo{font-family:var(--display);font-size:44px;line-height:1.02;
    background:linear-gradient(100deg,var(--hot),var(--hot2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo small{display:block;font-family:var(--round);font-size:14px;color:var(--mut);-webkit-text-fill-color:var(--mut);margin-top:8px}
  h2{font-family:var(--round);font-weight:400;font-size:15px;margin:24px 0 8px;color:var(--ink)}
  .field{width:100%;background:#241f37;border:1.5px solid #3a3352;color:var(--ink);border-radius:14px;
    padding:15px 16px;font-size:16px;font-family:var(--body);outline:none}
  .field:focus{border-color:var(--hot)}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .pick{padding:14px 0;border-radius:14px;border:1.5px solid #3a3352;background:#241f37;
    font-family:var(--round);font-size:15px;color:var(--mut);cursor:pointer;transition:.15s;text-align:center}
  .pick.on{color:#15121f;font-weight:700;transform:translateY(-2px);background:var(--hot);border-color:var(--hot)}
  .pick[data-g="1"].on{background:var(--g1);border-color:var(--g1)}
  .pick[data-g="2"].on{background:var(--g2);border-color:var(--g2)}
  .pick[data-g="3"].on{background:var(--g3);border-color:var(--g3)}
  .pick[data-g="4"].on{background:var(--g4);border-color:var(--g4)}
  .cta{margin-top:26px;width:100%;border:none;border-radius:16px;padding:17px;cursor:pointer;
    font-family:var(--round);font-size:18px;color:#221206;
    background:linear-gradient(100deg,var(--hot),var(--hot2));box-shadow:0 10px 24px -8px rgba(255,122,89,.6)}
  .cta:disabled{filter:grayscale(.7) brightness(.7);box-shadow:none;cursor:not-allowed}
  .ghost{margin-top:10px;width:100%;border:1.5px solid #3a3352;background:transparent;color:var(--mut);
    border-radius:14px;padding:13px;font-family:var(--round);font-size:14px;cursor:pointer}

  /* gacha */
  .gacha{text-align:center}
  .prob{display:flex;justify-content:center;gap:8px;margin:14px 0 20px;flex-wrap:wrap}
  .prob span{font-family:var(--round);font-size:12px;padding:6px 11px;border-radius:20px;background:#241f37;border:1px solid #3a3352}
  .prob .b{color:var(--basic)} .prob .r{color:var(--rare)} .prob .l{color:var(--legend)}
  .orb{width:200px;height:200px;margin:6px auto;border-radius:50%;display:flex;align-items:center;justify-content:center;
    position:relative;background:radial-gradient(circle at 35% 30%,#3a3352,#1b1730);box-shadow:inset 0 0 40px rgba(0,0,0,.5)}
  .orb.shake{animation:shake .6s ease}
  .reveal{animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  .rtag{font-family:var(--display);font-size:30px;margin-top:6px;letter-spacing:1px}
  .rtag.basic{color:var(--basic)} .rtag.rare{color:var(--rare);text-shadow:0 0 16px rgba(91,140,255,.6)}
  .rtag.legend{color:var(--legend);text-shadow:0 0 22px rgba(255,207,58,.8)}
  .rsub{font-family:var(--round);font-size:14px;color:var(--mut);margin-top:2px}
  @keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-6px) rotate(-4deg)}
    40%{transform:translateX(6px) rotate(4deg)}60%{transform:translateX(-5px) rotate(-3deg)}80%{transform:translateX(5px) rotate(3deg)}}
  @keyframes pop{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}
  .burst{position:absolute;inset:-20px;border-radius:50%;pointer-events:none}
  .burst.on{animation:burst .6s ease forwards}
  @keyframes burst{from{box-shadow:0 0 0 0 rgba(255,207,58,.55)}to{box-shadow:0 0 0 60px rgba(255,207,58,0)}}

  /* ============ GAME WORLD (portrait, fills viewport) ============ */
  #game{display:none;flex:1;flex-direction:column;animation:fade .4s ease}
  .hud{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:10px 14px}
  .hud .mark{font-family:var(--display);font-size:18px;background:linear-gradient(100deg,var(--hot),var(--hot2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hud .right{margin-left:auto;display:flex;gap:8px}
  .btn{border:1.5px solid #3a3352;background:#241f37;color:var(--ink);border-radius:12px;
    padding:9px 13px;font-family:var(--round);font-size:13px;cursor:pointer}
  .btn:active{transform:scale(.96)}
  .btn.hot{background:linear-gradient(100deg,var(--hot),var(--hot2));color:#221206;border:none}
  .btn.off{opacity:.5}

  .stage-wrap{padding:0 12px 14px;flex:1;display:flex;flex-direction:column;min-height:0}
  .stage{position:relative;width:100%;flex:1;min-height:0;border-radius:18px;overflow:hidden;cursor:pointer;
    background:linear-gradient(180deg,#2f6a4a,#2a5c42);
    box-shadow:0 18px 50px -12px rgba(0,0,0,.6), inset 0 0 80px rgba(0,0,0,.4);touch-action:none}
  /* the scrolling world (larger than the viewport) */
  .world{position:absolute;left:0;top:0;will-change:transform;
    background:
      radial-gradient(80% 60% at 30% 25%, rgba(255,255,255,.05), transparent 60%),
      linear-gradient(180deg,#3a7a55 0%, #2f6a4a 45%, #285740 100%)}
  .grid{position:absolute;inset:0;opacity:.35;
    background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:48px 48px}
  .bush{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 30%,#4f9a6a,#2f6a48);box-shadow:inset -4px -6px 10px rgba(0,0,0,.25)}
  .tree{position:absolute;width:48px;height:48px}

  /* booth zones */
  .booth{position:absolute;border-radius:20px;border:2px dashed rgba(255,255,255,.22);
    background:rgba(0,0,0,.10);display:flex;align-items:flex-start;justify-content:center}
  .booth .name{margin-top:-13px;font-family:var(--round);font-size:13px;color:#fff;
    background:rgba(0,0,0,.5);padding:3px 12px;border-radius:20px;white-space:nowrap}
  .booth.tinted{background:rgba(255,255,255,.05)}

  .pad{position:absolute;transform:translate(-50%,-50%);border-radius:24px;display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-size:48px;transition:box-shadow .25s}
  .pad .lab{position:absolute;top:6px;font-family:var(--round);font-size:11px;opacity:.85}
  .pad.O{background:radial-gradient(circle,rgba(63,214,196,.32),rgba(63,214,196,.10));border:3px solid var(--o);color:var(--o);
    box-shadow:0 0 28px rgba(63,214,196,.35), inset 0 0 30px rgba(63,214,196,.25)}
  .pad.X{background:radial-gradient(circle,rgba(255,122,138,.32),rgba(255,122,138,.10));border:3px solid var(--x);color:var(--x);
    box-shadow:0 0 28px rgba(255,122,138,.35), inset 0 0 30px rgba(255,122,138,.25)}

  /* scoreboard (LED) — fixed to viewport */
  .board{position:absolute;left:50%;top:12px;transform:translateX(-50%);width:min(92%,520px);
    background:linear-gradient(#0e0c16,#191527);border:1px solid #3a3352;border-radius:14px;
    padding:9px 14px;box-shadow:0 10px 24px -10px #000;z-index:8;transition:padding .2s, width .2s}
  .board .q{font-family:var(--round);font-size:clamp(12px,2.4vw,15px);text-align:center;color:var(--ink);line-height:1.3;padding:0 18px}
  .board .qn{color:var(--hot2);font-size:11px}
  .board .counts{display:flex;justify-content:center;gap:18px;margin-top:6px}
  .board .c{font-family:var(--display);font-size:clamp(20px,5vw,28px);display:flex;align-items:baseline;gap:6px}
  .board .c .t{font-family:var(--round);font-size:13px}
  .board .c.o{color:var(--o)} .board .c.x{color:var(--x)}
  .board .c .v{min-width:28px;text-align:center;text-shadow:0 0 14px currentColor}
  .board .toggle{position:absolute;top:6px;right:8px;width:24px;height:24px;border:none;cursor:pointer;
    background:#2c2640;color:var(--mut);border-radius:8px;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center}
  .board .toggle:active{transform:scale(.92)}
  .board .body{overflow:hidden;transition:max-height .22s ease, opacity .18s;max-height:120px;opacity:1}
  .board.collapsed{width:min(72%,360px);padding:6px 14px}
  .board.collapsed .body{max-height:0;opacity:0;margin:0}
  .board .mini-q{display:none;font-family:var(--round);font-size:12px;color:var(--mut);text-align:center;padding:0 26px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .board.collapsed .mini-q{display:block}

  /* minimap */
  .mini{position:absolute;right:10px;bottom:10px;width:72px;border:1px solid rgba(255,255,255,.25);
    border-radius:8px;overflow:hidden;z-index:8;background:rgba(20,30,24,.7)}
  .mini canvas{display:block;width:100%}

  .hint{position:absolute;left:10px;bottom:10px;z-index:7;max-width:calc(100% - 102px);
    font-family:var(--round);font-size:12px;color:#fff;background:rgba(0,0,0,.34);padding:6px 14px;border-radius:20px}

  /* avatars live INSIDE .world */
  #avatars{position:absolute;inset:0;pointer-events:none}
  .av{position:absolute;width:56px;height:74px;transform:translate(-50%,-100%);transition:none;z-index:3}
  .av .tag{position:absolute;top:-4px;left:50%;transform:translateX(-50%);white-space:nowrap;
    font-family:var(--round);font-size:11px;color:#fff;background:rgba(0,0,0,.4);padding:2px 8px;border-radius:10px;display:flex;align-items:center;gap:5px}
  .av .tag i{font-style:normal;font-size:10px;font-weight:700;color:#15121f;padding:1px 5px;border-radius:7px;line-height:1.3}
  .av .cbox{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:56px;height:62px}
  .av .cbox svg{width:100%;height:100%;display:block}
  .av.left .cbox{transform:translateX(-50%) scaleX(-1)}
  .av.moving .cbox{animation:bob .4s infinite}
  @keyframes bob{0%,100%{translate:0 0}50%{translate:0 -3px}}
  .av.rare .cbox svg{filter:drop-shadow(0 0 4px rgba(92,200,255,.95))}
  .av.legend .cbox svg{filter:drop-shadow(0 0 5px rgba(255,213,74,.95)) drop-shadow(0 0 11px rgba(255,180,40,.55))}
  .av.legend .ring{position:absolute;bottom:2px;left:50%;width:46px;height:18px;transform:translateX(-50%);
    border-radius:50%;border:2px solid rgba(255,213,74,.8);box-shadow:0 0 10px rgba(255,200,60,.6);animation:ring 1.6s infinite}
  @keyframes ring{0%{opacity:.75;transform:translateX(-50%) scale(.8)}100%{opacity:0;transform:translateX(-50%) scale(1.5)}}
  .av .spark{position:absolute;width:5px;height:5px;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle,#fff,rgba(255,255,255,0) 70%);animation:twk 1.5s infinite}
  .av.rare .spark{background:radial-gradient(circle,#cdeeff,rgba(205,238,255,0) 70%)}
  .av.legend .spark{background:radial-gradient(circle,#fff3c4,rgba(255,243,196,0) 70%);width:6px;height:6px}
  @keyframes twk{0%,100%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1)}}
  .av.me .tag{background:rgba(255,122,89,.85)}

  /* gifts (3D) */
  .g3wrap{position:relative;width:150px;height:150px;margin:10px auto 4px;display:flex;align-items:center;justify-content:center;
    font-size:64px;background:radial-gradient(circle at 50% 32%,#322b4c,#1b1730);border:1px solid #3a3352;border-radius:16px;overflow:hidden}
  .g3wrap canvas{position:absolute;inset:0;width:100%;height:100%}
  .g3wrap.sm{width:92px;height:92px;font-size:42px;margin:0;flex:none;border-radius:12px}
  #giftBox{display:none;margin-top:16px;background:#241f37;border:1px solid #3a3352;border-radius:16px;padding:12px 12px 14px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  .gtitle{font-family:var(--round);font-size:13px;color:var(--hot2)}
  .gname{font-family:var(--round);font-size:17px;margin-top:4px}
  .gstory{font-size:12px;color:var(--mut);line-height:1.55;margin-top:5px;padding:0 6px}
  .gtoggle{margin-top:14px;background:#241f37;border:1.5px solid #3a3352;border-radius:14px;padding:12px;cursor:pointer;text-align:left;transition:.15s}
  .gtoggle.on{border-color:var(--hot2);background:#2b2340}
  .gtoggle.off{opacity:.55;cursor:default;font-family:var(--round);font-size:13px}
  .gtoggle .gt-head{font-family:var(--round);font-size:14px}
  .gtoggle .gt-story{font-size:12px;color:var(--mut);margin-top:6px;line-height:1.5}
  .ngift{display:flex;gap:10px;align-items:center;margin-top:9px;background:#1f1a31;border:1px dashed #4a4168;border-radius:10px;padding:8px}
  .ngift-t{font-family:var(--round);font-size:13px}
  .ngift-t span{font-family:var(--body);font-size:11px;color:var(--mut);line-height:1.45;display:block;margin-top:3px}

  /* lockers (기수 교류존) */
  .locker{position:absolute;width:90px;height:116px;border-radius:10px;border:2px solid rgba(0,0,0,.28);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;box-shadow:0 8px 18px rgba(0,0,0,.35), inset 0 2px 0 rgba(255,255,255,.25);
    transition:transform .15s}
  .locker:active{transform:scale(.94)}
  .locker .glab{font-family:var(--round);font-size:12px;color:#15121f;background:rgba(255,255,255,.88);
    padding:2px 9px;border-radius:12px;margin-top:8px;white-space:nowrap}
  .locker .slot{width:46px;height:7px;background:rgba(0,0,0,.38);border-radius:3px;margin-top:10px}
  .locker .handle{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.75);margin-top:24px;
    box-shadow:inset 0 -2px 3px rgba(0,0,0,.3)}
  .locker .badge{position:absolute;top:-9px;right:-9px;min-width:22px;height:22px;border-radius:11px;
    background:#ff5c5c;color:#fff;font-family:var(--round);font-size:12px;
    display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 3px 8px rgba(0,0,0,.4)}

  /* locker modal */
  .modalbg{position:fixed;inset:0;background:rgba(10,8,18,.6);backdrop-filter:blur(3px);z-index:70;
    display:flex;align-items:center;justify-content:center;padding:16px;animation:fade .2s ease}
  .modal{width:min(96%,460px);max-height:88dvh;overflow-y:auto;background:#1b1730;border:1px solid #3a3352;
    border-radius:18px;padding:18px 18px 22px;box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .modal .mhead{display:flex;align-items:center;gap:8px;font-family:var(--round);font-size:18px}
  .modal .mhead .x{margin-left:auto;border:none;background:#2c2640;color:var(--mut);width:30px;height:30px;
    border-radius:10px;font-size:14px;cursor:pointer}
  .modal h2{margin:16px 0 8px}
  .modal textarea.field{resize:none;height:84px}
  input,textarea{-webkit-user-select:text;user-select:text}
  .notes{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:200px;overflow-y:auto}
  .note{background:#241f37;border:1px solid #3a3352;border-radius:12px;padding:10px 12px}
  .note .to{font-family:var(--round);font-size:13px;color:var(--hot2)}
  .note .txt{font-size:14px;line-height:1.5;margin:4px 0;white-space:pre-wrap;word-break:break-word}
  .note .from{font-size:11px;color:var(--mut);text-align:right}
  .empty{font-size:13px;color:var(--mut);text-align:center;padding:14px 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chip{font-family:var(--round);font-size:12px;padding:6px 12px;border-radius:18px;background:#241f37;
    border:1.5px solid #3a3352;color:var(--mut);cursor:pointer}
  .chip.on{background:var(--hot);border-color:var(--hot);color:#15121f}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  .pop{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#15121f;font-family:var(--round);font-size:14px;padding:10px 18px;border-radius:30px;z-index:60;transition:.25s;pointer-events:none}
  .pop.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* install (add-to-home-screen) guide modal */
  .a2hs-bg{position:fixed;inset:0;background:rgba(10,8,18,.72);backdrop-filter:blur(4px);z-index:90;
    display:flex;align-items:center;justify-content:center;padding:18px;animation:fade .25s ease}
  .a2hs{width:min(94%,400px);max-height:92dvh;overflow-y:auto;background:#1b1730;border:1px solid #3a3352;
    border-radius:22px;padding:24px 22px 20px;box-shadow:0 30px 70px rgba(0,0,0,.7);text-align:center}
  .a2hs .ic{font-size:40px;line-height:1}
  .a2hs h3{font-family:var(--display);font-size:24px;margin:8px 0 4px;
    background:linear-gradient(100deg,var(--hot),var(--hot2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .a2hs .sub{font-family:var(--round);font-size:13px;color:var(--mut);line-height:1.5;margin-bottom:18px}
  .a2hs ol{list-style:none;margin:0;padding:0;text-align:left;display:flex;flex-direction:column;gap:9px}
  .a2hs li{display:flex;align-items:center;gap:12px;background:#241f37;border:1px solid #3a3352;border-radius:14px;padding:11px 14px}
  .a2hs li .n{flex:0 0 26px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--round);font-size:13px;color:#221206;background:linear-gradient(100deg,var(--hot),var(--hot2))}
  .a2hs li .t{font-family:var(--body);font-size:14px;line-height:1.4;color:var(--ink)}
  .a2hs li .t b{color:var(--hot2)}
  .a2hs .note2{font-family:var(--round);font-size:12px;color:var(--mut);margin:14px 2px 0;line-height:1.5}
  .a2hs .note2 b{color:var(--ink)}
  .a2hs .chkrow{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0 2px;cursor:pointer}
  .a2hs .chkrow input{width:16px;height:16px;accent-color:var(--hot);cursor:pointer}
  .a2hs .chkrow span{font-family:var(--round);font-size:13px;color:var(--mut)}
  .a2hs .closebtn{margin-top:14px;width:100%;border:none;border-radius:14px;padding:14px;cursor:pointer;
    font-family:var(--round);font-size:16px;color:#221206;background:linear-gradient(100deg,var(--hot),var(--hot2))}
</style>

<div class="app">
  <div id="screen"></div>
  <div id="game">
    <div class="hud">
      <div class="mark">팀메이트 라이브</div>
      <div class="right">
        <button class="btn" id="btnNpc">NPC ON</button>
        <button class="btn hot" id="btnNext">다음 문제 ▶</button>
        <button class="btn" id="btnReset">↺</button>
      </div>
    </div>
    <div class="stage-wrap">
      <div class="stage" id="stage">
        <div class="world" id="world">
          <div class="ground" id="ground"></div>
          <div id="avatars"></div>
        </div>
        <div class="board" id="board"></div>
        <div class="mini" id="mini"><canvas id="miniC" width="72" height="118"></canvas></div>

const HAS=(typeof window!=='undefined'&&window.storage&&typeof window.storage.list==='function');
let SHARED_OK=HAS; const mem={true:{},false:{}};
async function sset(k,v,sh){const val=typeof v==='string'?v:JSON.stringify(v);
  if(HAS){try{await window.storage.set(k,val,sh);return;}catch(e){SHARED_OK=false;}} mem[!!sh][k]=val;}
async function sget(k,sh){if(HAS){try{const r=await window.storage.get(k,sh);return r?r.value:null;}catch(e){return mem[!!sh][k]??null;}} return mem[!!sh][k]??null;}
async function slist(p,sh){if(HAS){try{const r=await window.storage.list(p,sh);return(r&&r.keys)?r.keys:[];}catch(e){SHARED_OK=false;}} return Object.keys(mem[!!sh]).filter(k=>k.startsWith(p));}

/* ===================== character art ===================== */
function buildChar(c){
  const outfit=c.outfit||'#6c8cff', outfitD=shade(outfit,-24), outfitL=shade(outfit,22);
  const hair=HAIRC[(c.hairCI!=null?c.hairCI:c.hairI)||0]||'#6b4a32', hairD=shade(hair,-28), hairL=shade(hair,30);
  const skin=SKIN[c.skinI||0]||'#ffe0c4', skinD=shade(skin,-16);
  const eye=EYEC[c.eyeI||0]||'#3aa0ff';
  const gender=c.gender||'F', style=c.style||(gender==='M'?'short':'long');
  const shoe='#3a3550', shoeL='#565077', dk='#3a2a38', wt='#ffffff', bl='rgba(255,120,135,.5)', mo='#c47b72', ol='#473a47', eyeline='#7a6470';
  const rareA='#5cc8ff', rareA2='#bdeaff', rareGem='#ff5ca8';
  const legA='#ffd54a', legA2='#fff3c4', legGem='#ff6b6b', wing='#fff6e0';

  const W=44,H=56, g=Array.from({length:H},()=>Array(W).fill(null));
  const inb=(x,y)=>x>=0&&x<W&&y>=0&&y<H;
  const P=(x,y,col)=>{if(inb(Math.round(x),Math.round(y)))g[Math.round(y)][Math.round(x)]=col;};
  const R=(x0,y0,x1,y1,col)=>{for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)P(x,y,col);};
  const E=(cx,cy,rx,ry,col)=>{for(let y=Math.floor(cy-ry);y<=Math.ceil(cy+ry);y++)for(let x=Math.floor(cx-rx);x<=Math.ceil(cx+rx);x++){const dx=(x-cx)/rx,dy=(y-cy)/ry;if(dx*dx+dy*dy<=1)P(x,y,col);}};

  // ---- rarity back layer (capes / wings) ----
  if(c.rarity==='rare'){
    R(8,35,14,50,rareA); R(8,50,12,52,rareA);     // flowing cape (back)
    R(8,35,9,50,shade(rareA,-34));                 // inner shadow
    R(13,36,14,49,rareA2);                         // highlight edge
  }
  if(c.rarity==='legend'){
    R(10,31,14,34,wing); R(7,33,12,37,wing); R(5,36,11,40,wing); R(6,40,11,43,wing); // back wing
    P(5,36,legA);P(7,33,legA);P(10,31,legA);P(6,40,legA);
    R(31,32,35,35,wing); R(33,35,37,38,wing); R(35,38,37,40,wing);                    // front wing
    P(37,38,legA);P(35,32,legA);
  }
  // legs + shoes
  R(18,49,20,52,skin); R(24,49,26,52,skin);
  R(17,52,21,54,shoe); R(23,52,27,54,shoe); R(17,52,21,52,shoeL); R(23,52,27,52,shoeL);
  // arms (sleeves) + hands
  R(11,35,13,46,outfit); R(11,35,11,46,outfitD); R(11,46,13,49,skin);
  R(30,35,32,46,outfit); R(32,35,32,46,outfitD); R(30,46,32,49,skin);
  // body + shading
  R(14,34,29,49,outfit); R(15,34,28,35,outfitL); R(14,48,29,49,outfitD);
  R(14,36,14,47,outfitD); R(29,36,29,47,outfitD); R(19,34,24,35,shade(outfit,32));
  // ---- rarity front trim / gem ----
  if(c.rarity==='rare'){ R(14,40,29,40,rareA); R(20,38,23,39,rareGem); P(20,37,rareA2); }
  if(c.rarity==='legend'){ R(14,40,29,40,legA); R(14,34,29,34,legA); R(20,37,23,39,legGem); P(20,37,legA2); }

  // ---- head turned to face the side (3/4, facing right) ----
  // back hair sits toward the back (left); darker rim + lighter core
  E(20,18.5,15,15,hairD); E(20,18,13.7,13.7,hair);
  if(style==='long'||style==='wavy'){R(6,18,10,42,hair); R(31,20,35,40,hair); if(style==='wavy'){R(6,42,8,45,hair);}}
  if(style==='twin'){E(8,30,5,9,hair); E(33,30,4,8,hair); R(6,22,10,24,hairD);}
  if(style==='bun'){E(13,10,6,6,hairD); E(13,10,4.6,4.6,hair); R(8,14,16,30,hair);}
  if(style==='bob'){R(7,20,11,33,hair); R(33,22,36,32,hair);}
  E(15,12,4.5,2.4,hairL); // gloss
  // face skin shifted toward facing side
  E(23,21,13,13,skin);
  // soft nose bump on facing side
  P(35,23,skin); P(35,24,skin); P(34,25,skinD);
  // fringe swept toward the face (kept above the eyes)
  if(style==='spiky'){for(let x=10;x<=36;x++)R(x,7,x,(x%4<2?11:14),hair); R(10,7,36,8,hairD);}
  else if(style==='sweep'){R(10,10,36,13,hair); R(24,13,36,16,hair); R(12,14,34,14,hairD);}
  else{R(10,9,36,13,hair); R(27,13,36,15,hair); for(let x=10;x<=26;x++)R(x,13,x,(x%6<3?14:13),hair); R(12,15,25,15,hairD); E(16,11,4,1.8,hairL);}

  // ---- eyes: gentle & cute, prettier at higher rarity ----
  const tier = c.rarity==='legend' ? 2 : (c.rarity==='rare' ? 1 : 0);
  const eyeAt=(cx,s)=>{
    const ss = s*(1+tier*0.12);              // bigger eyes at higher rarity
    if(tier>=1){ R(cx-2,20,cx+2,20,eyeline); P(cx-3,21,eyeline); P(cx+3,21,eyeline); } // soft upper lash line
    E(cx,23,2.4*ss,3.1,wt);                  // white
    E(cx,23.6,1.9*ss,2.5,shade(eye,18));     // iris outer (lighter)
    E(cx,24,1.5*ss,2.1,eye);                 // iris
    E(cx,24.6,0.75*ss,1.0,dk);               // pupil
    P(cx-1,22,wt);                          // main sparkle
    if(tier>=1){ P(cx+1,25,'rgba(255,255,255,.85)'); } // second highlight (rare+)
    if(tier>=2){ P(cx+2,23,'rgba(255,255,255,.6)'); }  // one extra glimmer (legend)
    P(cx+1,26,'rgba(255,255,255,.4)');       // lower glint
  };
  eyeAt(25,0.82); eyeAt(31,1);
  // soft eyebrows
  P(24,18,eyeline); P(25,17.6,eyeline); P(30,17.4,eyeline); P(31,17.6,eyeline); P(32,18,eyeline);
  // centered gentle smile (no pout, no blush)
  P(26,29,mo); P(27,30,mo); P(28,30,mo); P(29,29,mo);   // upturned little smile, centered under nose
  // accessory (head)
  if(c.rarity==='rare'){
    // dangling earring on the visible (front) ear
    P(36,27,rareA2); P(36,28,rareA); P(36,29,rareGem);
    // small hair clip
    P(11,12,rareA); P(12,12,rareA2);
  }
  if(c.rarity==='legend'){
    // ornate jeweled crown
    R(11,5,30,7,legA); R(11,5,30,5,legA2);
    R(13,2,13,5,legA); R(16,1,16,5,legA); R(20,0,20,5,legA); R(24,1,24,5,legA); R(28,2,28,5,legA);
    P(16,0,legA2);P(20,0,legA2);P(24,0,legA2);
    P(13,6,'#6bd0ff');P(16,6,legGem);P(20,5,legA2);P(24,6,legGem);P(28,6,'#6bd0ff'); // crown gems
    // large jeweled earring on visible ear
    P(36,26,legA2); P(37,27,legA); P(37,28,legGem); P(36,29,legGem); P(37,29,legA2);
    // forehead jewel
    P(24,16,legGem); P(24,15,legA2);
  }

  // 1px silhouette outline
  const out=[];
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){ if(g[y][x]!=null)continue;
    if((inb(x-1,y)&&g[y][x-1]!=null)||(inb(x+1,y)&&g[y][x+1]!=null)||(inb(x,y-1)&&g[y-1][x]!=null)||(inb(x,y+1)&&g[y+1][x]!=null)) out.push([x,y]);
  }
  out.forEach(([x,y])=>g[y][x]=ol);
  // soft shadow under feet (empty cells only)
  for(let x=15;x<=28;x++){ if(g[55][x]==null)g[55][x]='rgba(0,0,0,.13)'; }

  // run-length encode to rects
  let rects='';
  for(let y=0;y<H;y++){let x=0;while(x<W){const col=g[y][x];if(col==null){x++;continue;}let x2=x;while(x2+1<W&&g[y][x2+1]===col)x2++;rects+=`<rect x="${x}" y="${y}" width="${x2-x+1}" height="1" fill="${col}"/>`;x=x2+1;}}
  return `<svg viewBox="0 0 ${W} ${H}" shape-rendering="crispEdges">${rects}</svg>`;
}
function shade(hex,p){let n=parseInt(hex.slice(1),16);let r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
function rollRarity(){const r=Math.random()*100; if(r<3)return'legend'; if(r<20)return'rare'; return'basic';}
function rollChar(gender){const rarity=rollRarity();const arr=OUTFIT[rarity];const styles=STYLE[gender]||STYLE.F;
  return{gender,rarity,outfit:arr[Math.floor(Math.random()*arr.length)],
    hairCI:Math.floor(Math.random()*HAIRC.length),eyeI:Math.floor(Math.random()*EYEC.length),
    skinI:Math.floor(Math.random()*SKIN.length),style:styles[Math.floor(Math.random()*styles.length)]};}

function renderGacha(base){

function spawnBots(){

    const b={id:'bot'+i,kind:'bot',nick:BOT_NICKS[i%BOT_NICKS.length],gen:1+Math.floor(Math.random()*4),

function botAI(b,now){

async function pollRemote(){
  const keys=await slist('p:',true); const now=Date.now(); const seen=new Set();

    const id=k.slice(2); if(id===me.id)continue; if(now-d.ts>12000)continue; seen.add(id);
    let e=entities.find(x=>x.id===id);
    if(!e){e={id,kind:'remote',nick:d.nick,gen:d.gen,char:d.char,x:d.x,y:d.y,tx:d.x,ty:d.y,face:1};entities.push(e);ensureEl(e);}

    const dx=e.tx-e.x, dy=e.ty-e.y, dist=Math.hypot(dx,dy);

    }catch(e){return false;} // e.g. opened from file:// — emoji fallback shows instead
    if(!canvas.isConnected)return true;
    views.push({canvas,ctx:canvas.getContext('2d')});
    if(!looping){looping=true;requestAnimationFrame(tick);}
    return true;
  }
};
</script>
